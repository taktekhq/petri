services:
  postgres:
    # image: petri:postgres  # local build: docker build -t petri:postgres ../..
    image: ghcr.io/taktekhq/petri:0.1-alpha
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  app:
    image: oven/bun:1
    working_dir: /app
    volumes: [".:/app"]
    depends_on: [postgres]
