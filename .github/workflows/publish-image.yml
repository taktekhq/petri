name: Publish image

# Builds petri:postgres and pushes it to GHCR. Trigger by pushing a tag
# (e.g. v0.1-alpha) or running the workflow manually with a tag input.
#
# The first published artifact is ghcr.io/taktekhq/petri:0.1-alpha.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (without leading v)'
        required: true
        default: '0.1-alpha'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/taktekhq/petri:${{ steps.tag.outputs.value }}
            ghcr.io/taktekhq/petri:latest
