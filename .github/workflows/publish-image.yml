name: Publish image

# Builds petri and pushes it to GHCR. Triggers:
#   - pushing a tag like v0.1-alpha, v1.2.3, etc.
#   - manual dispatch from the Actions tab (lets you choose the tag).
#
# secrets.GITHUB_TOKEN is provided automatically by Actions — no setup
# required beyond having "Read and write permissions" enabled under
# Settings -> Actions -> General -> Workflow permissions.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (without leading v)'
        required: true
        default: '0.1-alpha'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/taktekhq/petri:${{ steps.tag.outputs.value }}
            ghcr.io/taktekhq/petri:latest
